<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (sessionStorage.getItem("unlocked") !== "true") {
      window.location.href = "index.html";
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestbook - For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>

  <main class="container guestbookPage">
    <nav class="topNav">
      <a href="index.html" class="backLink">← Back</a>
      <a href="profile.html" class="backLink editProfileLink">Edit Profile</a>
    </nav>
    
    <h1 class="pageTitle">Guestbook</h1>

    <div id="authBox">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <div class="authActions">
        <button id="signupBtn">Sign up</button>
        <button id="loginBtn">Log in</button>
      </div>
      <small id="authStatus"></small>
    </div>

    <div id="postBox" class="hidden">
      <div class="composeRow">
        <div class="avatar" id="composeAvatar"></div>
        <textarea id="textInput" placeholder="Write a message for Sora..."></textarea>
      </div>
      <button id="uploadBtn">Post Message</button>
    </div>

    <div id="postsList">
      </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
