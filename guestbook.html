<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    /* Hide everything until auth resolves — prevents login flash */
    body > .stars,
    body > main { opacity: 0; transition: opacity 0.3s ease; }
    body.auth-ready > .stars,
    body.auth-ready > main { opacity: 1; }

    /* Tidy navbar — scoped to this page only */
    .guestbookPage .topNav .backLink {
      margin-bottom: 0;
      float: none;
    }
    .guestbookPage .topNav {
      flex-wrap: nowrap;
      gap: 12px;
    }
    .guestbookPage .navRightGroup {
      flex-wrap: nowrap;
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyAIkgVQ2vwi5NZZcH2jmexNkXTsOJg3SXU",
      authDomain: "sora-1102.firebaseapp.com",
      projectId: "sora-1102",
      storageBucket: "sora-1102.firebasestorage.app",
      messagingSenderId: "310837588219",
      appId: "1:310837588219:web:5c135df72b3c76269f405e"
    });
    onAuthStateChanged(getAuth(app), (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.body.classList.add("auth-ready");
      }
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guestbook - For Sora</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="guestbook-v3-additions.css">
</head>
<body>

  <div class="stars"></div>

  <main class="container guestbookPage guestbookV2">
    <nav class="topNav">
      <a href="index.html" class="backLink"><span class="icon icon-back" aria-hidden="true"></span>Back</a>
      <div class="navRightGroup">
        <a href="profile.html" class="backLink editProfileLink">Edit Profile</a>
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <header class="gbHeader">
      <h1 class="pageTitle">Guestbook</h1>
      <p class="pageSubtitle">Leave a little note, a memory, or just say hi 💌</p>
    </header>

    <section id="authBox">
      <input type="email" id="email" placeholder="Email">
      <input type="password" id="password" placeholder="Password">
      <div class="authActions">
        <button id="signupBtn">Sign up</button>
        <button id="loginBtn">Log in</button>
      </div>
      <small id="authStatus"></small>
    </section>

    <section id="postBox" class="hidden">
      <div class="composeRow">
        <div class="avatar" id="composeAvatar"></div>
        <div class="composeMain">
          <textarea id="textInput" placeholder="Write a message for Sora..."></textarea>
          <div id="imagePreviewWrap" class="imagePreviewWrap hidden">
            <img id="imagePreview" alt="Selected photo preview">
            <button type="button" id="removeImageBtn" class="removeImageBtn" aria-label="Remove photo">&times;</button>
          </div>
        </div>
      </div>
      <input type="file" id="imageInput" accept="image/*" class="hidden">
      <div class="composeFooter">
        <button type="button" id="addPhotoBtn" class="composeIconBtn" aria-label="Add photo">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h3l1.5-2h7L17 7h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V8a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg>
        </button>
        <button id="uploadBtn">Post Message</button>
      </div>
    </section>

    <section id="postsList" class="gbFeed"></section>
  </main>

  <script type="module" src="app.js"></script>
  <script type="module" src="nav-controls.js"></script>
</body>
</html>
