<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body > .stars,
    body > main { opacity: 0; transition: opacity 0.3s ease; }
    body.auth-ready > .stars,
    body.auth-ready > main { opacity: 1; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyAIkgVQ2vwi5NZZcH2jmexNkXTsOJg3SXU",
      authDomain: "sora-1102.firebaseapp.com",
      projectId: "sora-1102",
      storageBucket: "sora-1102.firebasestorage.app",
      messagingSenderId: "310837588219",
      appId: "1:310837588219:web:5c135df72b3c76269f405e"
    });
    onAuthStateChanged(getAuth(app), (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.body.classList.add("auth-ready");
      }
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distance - For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>

  <main class="container distancePage">

    <nav class="topNav">
      <a href="index.html" class="backLink"><span class="icon icon-back" aria-hidden="true"></span>Back</a>
      <div class="navRightGroup">
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
        <button type="button" id="signoutBtn" class="navIconBtn" aria-label="Sign out">
          <span class="icon icon-signout" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <h1 class="pageTitle">Distance Between Us</h1>

    <!-- MAP IMAGE -->
    <div class="mapWrapper">
      <img src="map.png" alt="Map from Purwokerto to Kubu Raya" class="mapImage">
      <div class="mapOverlay">
        <span class="mapBadge left">Purwokerto </span>
        <span class="mapBadge right">Kubu Raya </span>
      </div>
    </div>

    <!-- STATS ROW -->
    <div class="distanceStats">
      <div class="statCard">
        <div class="statValue" id="kmCounter">0</div>
        <div class="statLabel">Kilometers Apart</div>
      </div>
      <div class="statCard">
        <div class="statValue" id="daysTogether">0</div>
        <div class="statLabel">Days We've Known Each Other</div>
      </div>
      <div class="statCard">
        <div class="statValue">~2h</div>
        <div class="statLabel">By Flight</div>
      </div>
    </div>

    <!-- ANIMATED DISTANCE LINE -->
    <div class="distanceLineWrap">
      <div class="cityDot">
        <div class="cityPulse"></div>
        <span>Purwokerto</span>
      </div>
      <div class="travelLine">
        <div class="travelPlane">✈</div>
      </div>
      <div class="cityDot right">
        <div class="cityPulse"></div>
        <span>Kubu Raya</span>
      </div>
    </div>

    <!-- QUOTE -->
    <p class="distanceQuote">
      "Maybe we're far apart,<br>
      but somehow talking to you<br>
      still feels comforting."
    </p>

  </main>

  <script>
    /* COUNTER ANIMATION */
    function animateCounter(id, target, duration) {
      const el = document.getElementById(id);
      const start = performance.now();
      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target).toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    /* DAYS KNOWN — change this date to when you first talked */
    const firstContact = new Date("2026-06-05");
    const daysDiff = Math.floor((Date.now() - firstContact.getTime()) / (1000 * 60 * 60 * 24));

    window.addEventListener("load", () => {
      animateCounter("kmCounter", 835, 2000);
      animateCounter("daysTogether", daysDiff, 2000);
    });
  </script>

  <script type="module" src="nav-controls.js"></script>

</body>
</html>
