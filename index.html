<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Sora</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .menuLink img,
    .menu button img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      display: inline-block;
      vertical-align: middle;
      filter: invert(1);
      opacity: 0.85;
    }
    .menuLink:hover img,
    .menu button:hover img {
      opacity: 1;
    }
  </style>
</head>
<body>

  <!-- STARS -->
  <div class="stars"></div>

  <!-- FIRST LAYER: SECURE AUTH GATEWAY (Shown if logged out) -->
  <div id="authBox" class="container hidden">
    <h1 style="text-align: center; margin-bottom: 15px;">Private Space</h1>
    <p style="text-align: center; opacity: 0.7; margin-bottom: 25px;">Please sign up or log in to enter.</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn">Sign up</button>
    <button id="loginBtn">Log in</button>
    <small id="authStatus"></small>
  </div>

  <!-- SECOND LAYER: MAIN PRIVATE CONTENT (Hidden until logged in) -->
  <main id="mainContent" class="container hidden">

    <!-- TOP ICON ROW: theme switch + sign out -->
    <nav class="topNav homeNav">
      <div class="navRightGroup">
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
        <button type="button" id="signoutBtn" class="navIconBtn" aria-label="Sign out">
          <span class="icon icon-signout" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <h1 id="title"></h1>
      <p class="subtitle">
        Even from far away,
        you still became someone
        important to me.
      </p>
    </section>

    <!-- MENU -->
    <section class="menu">
      <button id="scanBtn"><img src="icon/scan.png" alt="">Scan</button>
      <a href="distance.html" class="menuLink"><img src="icon/distance.png" alt="">Distance</a>
      <a href="future.html" class="menuLink"><span class="icon icon-future" aria-hidden="true"></span>Future</a>
      <a href="game.html" class="menuLink"><img src="icon/game.png" alt="">Game</a>
      <a href="playlist.html" class="menuLink"><span class="icon icon-playlist" aria-hidden="true"></span>Playlist</a>
      <a href="guestbook.html" class="menuLink"><span class="icon icon-guestbook" aria-hidden="true"></span>Guestbook</a>
      <a href="profile.html" class="menuLink"><img src="icon/profile.png" alt="">Profile</a>
    </section>

  </main>

  <!-- QR POPUP -->
  <div id="qrPopup" class="popup hidden">
    <div class="popupCard">
      <button class="closeBtn" data-close="qrPopup">×</button>
      <h2>Scan This</h2>
      <img src="IMG_9358.png" alt="QR Code" class="qrImage">
      <p class="popupText">Scan this QR code.</p>
    </div>
  </div>

  <script type="module" src="script.js"></script>
  <script type="module" src="nav-controls.js"></script>

</body>
</html>
