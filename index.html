<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- STARS -->
  <div class="stars"></div>

  <!-- FIRST LAYER: SECURE AUTH GATEWAY (Shown if logged out) -->
  <div id="authBox" class="container hidden">
    <h1 style="text-align: center; margin-bottom: 15px;">Private Space</h1>
    <p style="text-align: center; opacity: 0.7; margin-bottom: 25px;">Please sign up or log in to enter.</p>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="signupBtn">Sign up</button>
    <button id="loginBtn">Log in</button>
    <small id="authStatus"></small>
  </div>

  <!-- SECOND LAYER: MAIN PRIVATE CONTENT (Hidden until logged in) -->
  <main id="mainContent" class="container hidden">

    <!-- HERO -->
    <section class="hero">
      <h1 id="title"></h1>
      <p class="subtitle">
        Even from far away,
        you still became someone
        important to me.
      </p>
    </section>

    <!-- MENU -->
    <section class="menu">
      <button id="scanBtn">Scan</button>
      <a href="distance.html" class="menuLink">Distance</a>
      <a href="future.html" class="menuLink">Future</a>
      <a href="game.html" class="menuLink">Game</a>
      <a href="guestbook.html" class="menuLink">Guestbook</a>
      <a href="profile.html" class="menuLink">Profile</a>
    </section>

  </main>

  <!-- QR POPUP -->
  <div id="qrPopup" class="popup hidden">
    <div class="popupCard">
      <button class="closeBtn" data-close="qrPopup">×</button>
      <h2>Scan This</h2>
      <img src="IMG_9358.png" alt="QR Code" class="qrImage">
      <p class="popupText">Scan this QR code.</p>
    </div>
  </div>

  <!-- MUSIC -->
  <audio id="bgMusic" loop>
    <source src="theme.mp3" type="audio/mpeg">
  </audio>

  <!-- MUSIC BUTTON -->
  <button id="musicBtn">♫</button>

  <!-- Changed to type="module" to allow Firebase authentication tracking -->
  <script type="module" src="script.js"></script>

</body>
</html>
