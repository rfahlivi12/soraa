<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body > .stars,
    body > main { opacity: 0; transition: opacity 0.3s ease; }
    body.auth-ready > .stars,
    body.auth-ready > main { opacity: 1; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyAIkgVQ2vwi5NZZcH2jmexNkXTsOJg3SXU",
      authDomain: "sora-1102.firebaseapp.com",
      projectId: "sora-1102",
      storageBucket: "sora-1102.firebasestorage.app",
      messagingSenderId: "310837588219",
      appId: "1:310837588219:web:5c135df72b3c76269f405e"
    });
    onAuthStateChanged(getAuth(app), (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.body.classList.add("auth-ready");
      }
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist - For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stars"></div>

  <main class="container playlistPage">

    <nav class="topNav">
      <a href="index.html" class="backLink">← Back</a>
    </nav>

    <h1 class="pageTitle">Our Playlist</h1>
    <p class="pageSubtitle">Songs that sound like us</p>

    <button id="shuffleBtn" type="button" class="shuffleBtn">Play something random</button>

    <section class="formCard">
      <input type="text" id="songTitle" placeholder="Song title">
      <input type="text" id="songArtist" placeholder="Artist">
      <textarea id="songNote" placeholder="Why this song? (optional)"></textarea>
      <input type="url" id="songLink" placeholder="Link to listen (optional)">
      <button id="addSongBtn" type="button">Add Song</button>
    </section>
    <small id="playlistStatus"></small>

    <div id="songList" class="songList"></div>

  </main>

  <script type="module" src="playlist.js"></script>

</body>
</html>
