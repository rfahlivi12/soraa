<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body > .stars,
    body > main { opacity: 0; transition: opacity 0.3s ease; }
    body.auth-ready > .stars,
    body.auth-ready > main { opacity: 1; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyAIkgVQ2vwi5NZZcH2jmexNkXTsOJg3SXU",
      authDomain: "sora-1102.firebaseapp.com",
      projectId: "sora-1102",
      storageBucket: "sora-1102.firebasestorage.app",
      messagingSenderId: "310837588219",
      appId: "1:310837588219:web:5c135df72b3c76269f405e"
    });
    onAuthStateChanged(getAuth(app), (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.body.classList.add("auth-ready");
      }
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist - For Sora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .songPlayToggle {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform 0.15s, opacity 0.15s, background 0.15s;
    }
    .songPlayToggle img {
      height: 22px;
      width: 22px;
      display: block;
      object-fit: contain;
      filter: invert(1);
      opacity: 0.85;
    }
    .songPlayToggle:hover  { transform: translateY(-1px); background: rgba(255,255,255,0.06); }
    .songPlayToggle:hover img { opacity: 1; }
    .songPlayToggle:active { transform: scale(0.92); }

    a.songLink {
      border: none;
      background: none;
      padding: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, opacity 0.15s, background 0.15s;
    }
    a.songLink img {
      height: 18px;
      width: 18px;
      display: block;
      object-fit: contain;
      filter: invert(1);
      opacity: 0.6;
    }
    a.songLink:hover  { transform: translateY(-1px); background: rgba(255,255,255,0.06); }
    a.songLink:hover img { opacity: 1; }
    a.songLink:active { transform: scale(0.92); }

    .songEmbed {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      border-radius: 10px;
      transition: max-height 0.3s ease;
    }
    .songEmbed iframe {
      width: 100%;
      border: none;
      display: block;
    }
    .songEmbed-youtube.open {
      max-height: 500px;
      margin-top: 10px;
    }
    .songEmbed-youtube iframe {
      aspect-ratio: 16 / 9;
      height: auto;
    }
    .songEmbed-spotify.open {
      max-height: 152px;
      margin-top: 10px;
    }
    .songEmbed-spotify iframe {
      height: 152px;
    }

    .formCard {
      margin-bottom: 30px;
    }
    .sortRow {
      max-width: 560px;
      margin: 0 auto 18px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .sortRow label {
      font-size: 0.8rem;
      opacity: 0.55;
    }
    .sortRow select {
      padding: 7px 12px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 0.82rem;
      font-family: Helvetica, Arial, sans-serif;
      outline: none;
      cursor: pointer;
    }
    .sortRow select:focus {
      border-color: rgba(232,180,160,0.4);
    }

    .songTime {
      font-size: 0.72rem;
      opacity: 0.38;
      white-space: nowrap;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <main class="container playlistPage">

    <nav class="topNav">
      <a href="index.html" class="backLink"><span class="icon icon-back" aria-hidden="true"></span>Back</a>
      <div class="navRightGroup">
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <h1 class="pageTitle">Our Playlist</h1>
    <p class="pageSubtitle">Songs that sound like us</p>

    <button id="shuffleBtn" type="button" class="shuffleBtn">Play something random</button>

    <section class="formCard">
      <input type="text" id="songTitle" placeholder="Song title">
      <input type="text" id="songArtist" placeholder="Artist">
      <textarea id="songNote" placeholder="Why this song? (optional)"></textarea>
      <input type="url" id="songLink" placeholder="Link to listen (optional)">
      <button id="addSongBtn" type="button">Add Song</button>
    </section>
    <small id="playlistStatus"></small>

    <div class="sortRow">
      <label for="sortSelect">Sort by</label>
      <select id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title">Title (A–Z)</option>
        <option value="artist">Artist (A–Z)</option>
      </select>
    </div>

    <div id="songList" class="songList"></div>

  </main>

  <script type="module" src="playlist.js?v=3"></script>
  <script type="module" src="nav-controls.js"></script>

</body>
</html>
