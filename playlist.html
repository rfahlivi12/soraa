<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body > .stars,
    body > main { opacity: 0; transition: opacity 0.3s ease; }
    body.auth-ready > .stars,
    body.auth-ready > main { opacity: 1; }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyAIkgVQ2vwi5NZZcH2jmexNkXTsOJg3SXU",
      authDomain: "sora-1102.firebaseapp.com",
      projectId: "sora-1102",
      storageBucket: "sora-1102.firebasestorage.app",
      messagingSenderId: "310837588219",
      appId: "1:310837588219:web:5c135df72b3c76269f405e"
    });
    onAuthStateChanged(getAuth(app), (user) => {
      if (!user) {
        window.location.href = "index.html";
      } else {
        document.body.classList.add("auth-ready");
      }
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist - For Sora</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .songPlayToggle {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    .songPlayToggle img {
      height: 30px;
      width: auto;
      display: block;
    }
    .songPlayToggle:hover  { transform: translateY(-1px); opacity: 0.8; }
    .songPlayToggle:active { transform: scale(0.95); opacity: 1; }

    a.songLink {
      border: none;
      background: none;
      padding: 0;
      display: inline-flex;
      align-items: center;
      transition: transform 0.15s, opacity 0.15s;
    }
    a.songLink img {
      height: 28px;
      width: auto;
      display: block;
      filter: invert(1);
      opacity: 0.6;
    }
    a.songLink:hover  { transform: translateY(-1px); }
    a.songLink:hover img { opacity: 1; }
    a.songLink:active { transform: scale(0.95); }

    /* Embed container fix */
    .songEmbed {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      border-radius: 12px;
      transition: max-height 0.3s ease;
    }
    .songEmbed.open {
      max-height: 400px;
      margin-top: 12px;
    }
    .songEmbed iframe {
      width: 100%;
      border: none;
      display: block;
    }
    .songEmbed-youtube iframe {
      aspect-ratio: 16 / 9;
      height: auto;
    }
    .songEmbed-spotify iframe {
      height: 152px;
    }
    .songEmbed-spotify.open {
      max-height: 180px;
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <main class="container playlistPage">

    <nav class="topNav">
      <a href="index.html" class="backLink"><span class="icon icon-back" aria-hidden="true"></span>Back</a>
      <div class="navRightGroup">
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <h1 class="pageTitle">Our Playlist</h1>
    <p class="pageSubtitle">Songs that sound like us</p>

    <button id="shuffleBtn" type="button" class="shuffleBtn">Play something random</button>

    <section class="formCard">
      <input type="text" id="songTitle" placeholder="Song title">
      <input type="text" id="songArtist" placeholder="Artist">
      <textarea id="songNote" placeholder="Why this song? (optional)"></textarea>
      <input type="url" id="songLink" placeholder="Link to listen (optional)">
      <button id="addSongBtn" type="button">Add Song</button>
    </section>
    <small id="playlistStatus"></small>

    <div id="songList" class="songList"></div>

  </main>

  <script type="module" src="playlist.js"></script>
  <script type="module" src="nav-controls.js"></script>

</body>
</html>
