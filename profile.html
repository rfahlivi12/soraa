<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- STARS -->
  <div class="stars"></div>

  <main class="container guestbookPage">
    <a href="index.html" class="backLink">← Back</a>
    <h1 class="pageTitle">Edit Profile</h1>

    <!-- Log in elements completely cleaned out. Managed through profile.js routing -->
    <div id="profileBox" class="hidden">

      <!-- Clickable Avatar Preview Area -->
      <div class="avatarPreview" id="avatarPreview" style="cursor: pointer; overflow: hidden; position: relative;"></div>
      
      <!-- Hidden file browser input for image files -->
      <input type="file" id="photoInput" accept="image/*" style="display: none;">
      <p style="font-size: 0.8rem; opacity: 0.5; margin-top: -10px; margin-bottom: 20px; text-align: center;">Tap circle to upload photo</p>

      <input type="text" id="displayNameInput" placeholder="Display name" maxlength="30">

      <div class="emojiGrid" id="emojiGrid">
        <button type="button" class="emojiOption" data-emoji="🌙">🌙</button>
        <button type="button" class="emojiOption" data-emoji="✨">✨</button>
        <button type="button" class="emojiOption" data-emoji="💫">💫</button>
        <button type="button" class="emojiOption" data-emoji="🌸">🌸</button>
        <button type="button" class="emojiOption" data-emoji="🦋">🦋</button>
        <button type="button" class="emojiOption" data-emoji="🌊">🌊</button>
        <button type="button" class="emojiOption" data-emoji="🔥">🔥</button>
        <button type="button" class="emojiOption" data-emoji="🎀">🎀</button>
      </div>

      <button id="saveProfileBtn">Save Profile</button>
      <small id="profileStatus"></small>
    </div>
  </main>

  <script type="module" src="profile.js"></script>

</body>
</html>
