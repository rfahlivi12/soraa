<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - For Sora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- STARS -->
  <div class="stars"></div>

  <main class="container guestbookPage">
    <nav class="topNav">
      <a href="index.html" class="backLink"><span class="icon icon-back" aria-hidden="true"></span>Back</a>
      <div class="navRightGroup">
        <button type="button" id="themeToggleBtn" class="navIconBtn" aria-label="Change theme">
          <span class="icon icon-theme" aria-hidden="true"></span>
        </button>
        <button type="button" id="signoutBtn" class="navIconBtn" aria-label="Sign out">
          <span class="icon icon-signout" aria-hidden="true"></span>
        </button>
      </div>
    </nav>

    <h1 class="pageTitle">Edit Profile</h1>

    <div id="profileBox" class="hidden">
      <div class="avatarPreview" id="avatarPreview"></div>

      <input type="text" id="displayNameInput" placeholder="Display name" maxlength="30">

      <div class="emojiGrid" id="emojiGrid">
        <button type="button" class="emojiOption" data-emoji="🌙">🌙</button>
        <button type="button" class="emojiOption" data-emoji="✨">✨</button>
        <button type="button" class="emojiOption" data-emoji="💫">💫</button>
        <button type="button" class="emojiOption" data-emoji="🌸">🌸</button>
        <button type="button" class="emojiOption" data-emoji="🦋">🦋</button>
        <button type="button" class="emojiOption" data-emoji="🌊">🌊</button>
        <button type="button" class="emojiOption" data-emoji="🔥">🔥</button>
        <button type="button" class="emojiOption" data-emoji="🎀">🎀</button>
      </div>

      <button id="saveProfileBtn">Save Profile</button>
      <small id="profileStatus"></small>
    </div>
  </main>

  <script type="module" src="profile.js"></script>
  <script type="module" src="nav-controls.js"></script>

</body>
</html>
